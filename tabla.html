tablas <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablas</title>
    <style>
        /* HEADER */
header{
    background-color: rgb(227, 65, 11);
    position: relative;
    font-size: 30px;
    padding: 15px;
}

header h1{
    text-align: center;
    color: white;
}

/* Imagen del header */
header img{
    width: 100px;
    height: 100px;
    border-radius: 50%;
    position: absolute;
    padding: 8px;
}

/* NAV */
nav{
    margin-left: 350px;
    margin-top: 15px;
}

nav a{
    text-decoration: none;
    color: white;
    padding: 5px;
    transition: 0.3s;
}

/* Hover links */
nav a:hover{
    color: black;
}

/* BODY */
body{
    background-color: rgb(160, 96, 12);
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
}

/* TITULO */
body h1{
    color: white;
    text-align: center;
    margin-top: 40px;
    font-size: 40px;
}

/* TABLA */
table{
    width: 70%;
    margin: 40px auto;
    border-collapse: collapse;
    background-color: rgb(227, 65, 11);
    color: white;
    border: 4px solid rgb(43, 42, 42);
    border-radius: 10px;
    overflow: hidden;
    font-size: 22px;
}

/* CELDAS */
th,
td{
    border: 2px solid rgb(43, 42, 42);
    padding: 15px;
    text-align: center;
}

/* ENCABEZADOS */
tr:first-child{
    background-color: rgb(190, 50, 5);
    font-size: 24px;
}

/* EFECTO HOVER */
tr:hover{
    background-color: rgb(255, 120, 60);
    transition: 0.3s;
}
    </style>
</head>
<body>
