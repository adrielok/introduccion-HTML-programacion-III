/* RESPONSIVE TABLET */
/* ========================= */

@media (max-width: 1024px){

    header{
        padding-bottom: 20px;
    }

    header img{
        position: static;
        display: block;
        margin: auto;
    }

    header h1{
        font-size: 28px;
        margin-top: 10px;
    }

    nav{
        margin-left: 0;
        text-align: center;
        margin-top: 20px;
    }

    nav a{
        display: inline-block;
        margin: 5px;
        font-size: 20px;
    }

    ol,
    ul{
        width: 80%;
        font-size: 20px;
    }
}

/* ========================= */
/* RESPONSIVE CELULAR */
/* ========================= */

@media (max-width: 600px){

    header h1{
        font-size: 22px;
    }

        display: block;
        padding: 10px;
        font-size: 18px;
    }

    ol,
    ul{
        width: 90%;
        padding: 15px;
        font-size: 17px;
    }

    li{
        margin: 8px 0;
    }

    hr{
        width: 90%;
    }

    header img{
        width: 80px;
        height: 80px;
    }
}
