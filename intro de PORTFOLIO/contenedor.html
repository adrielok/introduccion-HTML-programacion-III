<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contenedor</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .c1{
            background-color:green;
            width: 200px;
            height: 200px;
            border: 2px solid black;
            margin-left: 500px;
            text-align: center;
            border-radius: 50%;
        }
        .c2{
            background-color:rgb(0, 98, 128);
            width: 200px;
            height: 200px;
            border: 2px solid black;
            text-align: center;
            border-radius: 50%;
        }
        .c3{
            background-color:green;
            width: 200px;
            height: 200px;
            border: 2px solid black;
            margin-left: 1000px;
            text-align: center;
            border-radius: 50%;
        }
        .contpadre{
            background-color: aqua;
            position: relative;
        }

        .hijo1{
            background-color: violet;
            width: 120px;
            height: 120px;
            border: 2px solid black;
            position: absolute;
            top: -300px;
            left: 500px;
        }

        .hijo2{
            background-color: violet;
            width: 120px;
            height: 120px;
            border: 2px solid black;
            margin-left: 500px;
        }

        img{
            width: 120px;
            height: 120px;
        }

        header{
    background-color: rgb(227, 65, 11);
    position: relative;
    font-size: 30px;
        }

        header h1{
    text-align: center;
    color: white;
        }


        header img{
    width: 100px;
    height: 100px;
    border-radius: 50%;
    position: absolute;
    padding: 8px;
    
        }

        nav a{
    text-decoration: none;
    color: white;
    padding: 5px; 
        }

        nav{
    margin-left: 350px;
        }

        /* ========================= */
/* RESPONSIVE TABLET */
/* ========================= */

@media (max-width: 1024px){

    header{
        padding-bottom: 20px;
    }

    header img{
        position: static;
        display: block;
        margin: auto;
    }

    header h1{
        font-size: 28px;
        margin-top: 10px;
    }

    nav{
        margin-left: 0;
        text-align: center;
        margin-top: 20px;
    }

    nav a{
        display: inline-block;
        margin: 5px;
        font-size: 20px;
    }

    ol,
    ul{
        width: 80%;
        font-size: 20px;
    }
}

/* ========================= */
/* RESPONSIVE CELULAR */
/* ========================= */

@media (max-width: 600px){

    header h1{
        font-size: 22px;
    }

    nav a{
        display: block;
        padding: 10px;
        font-size: 18px;
    }

    ol,
    ul{
        width: 90%;
        padding: 15px;
        font-size: 17px;
    }

    li{
        margin: 8px 0;
    }

    hr{
        width: 90%;
    }

    header img{
        width: 80px;
        height: 80px;
    }
}
    </style>
</head>
<body>
    <header>
        <img src="./img/images.png" alt="">
        <h1>Introduccion etiquetas HTML</h1>
        <nav>
            <a href="contenedor.html">Contenedor</a>
            <a href="lista.html">Listas</a>
            <a href="tabla.html">Tablas</a>
            <a href="formulario.html">Formulario</a>
            <a href="boostrap.html">Boostrap</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="index.html">Inicio</a>
        </nav>
    </header>
    <h1>Modelado de caja</h1>

    <div class="c1">
        <p>Contenedor centro</p>
        <h2>Ejemplo de caja</h2>
    </div>
    <div class="c2">
        <p>Contenedor izquierda</p>
    </div>
    <div class="c3">
        <p>Contenedor derecha</p>
    </div>
    <div class="contpadre">
        <h2>Contenedor padre</h2>
        <div class="hijo1">
            <img src="./img/images.png" alt="">
        </div>
        <div class="hijo2">
            <h2>Contenedor Hijo </h2>
        </div>
    </div>
</body>
</html>
