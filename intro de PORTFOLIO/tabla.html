<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablas</title>

    <style>

        /* HEADER */
        header{
            background-color: rgb(227, 65, 11);
            position: relative;
            font-size: 30px;
            padding: 15px;
        }

        header h1{
            text-align: center;
            color: white;
        }

        /* Imagen del header */
        header img{
            width: 100px;
            height: 100px;
            border-radius: 50%;
            position: absolute;
            padding: 8px;
        }

        /* NAV */
        nav{
            margin-left: 350px;
            margin-top: 15px;
        }

        nav a{
            text-decoration: none;
            color: white;
            padding: 5px;
            transition: 0.3s;
        }

        /* Hover links */
        nav a:hover{
            color: black;
        }

        /* BODY */
        body{
            background-color: rgb(160, 96, 12);
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* TITULO */
        body h1{
            color: white;
            text-align: center;
            margin-top: 40px;
            font-size: 40px;
        }

        /* TABLA */
        table{
            width: 70%;
            margin: 40px auto;
            border-collapse: collapse;
            background-color: rgb(227, 65, 11);
            color: white;
            border: 4px solid rgb(43, 42, 42);
            border-radius: 10px;
            overflow: hidden;
            font-size: 22px;
        }

        /* CELDAS */
        th,
        td{
            border: 2px solid rgb(43, 42, 42);
            padding: 15px;
            text-align: center;
        }

        /* ENCABEZADOS */
        tr:first-child{
            background-color: rgb(190, 50, 5);
            font-size: 24px;
        }

        /* EFECTO HOVER */
        tr:hover{
            background-color: rgb(255, 120, 60);
            transition: 0.3s;
        }

        /* ========================= */
        /* RESPONSIVE TABLET */
        /* ========================= */

        @media (max-width: 1024px){

            header{
                padding-bottom: 20px;
            }

            header img{
                position: static;
                display: block;
                margin: auto;
            }

            header h1{
                font-size: 28px;
                margin-top: 10px;
            }

            nav{
                margin-left: 0;
                text-align: center;
                margin-top: 20px;
            }

            nav a{
                display: inline-block;
                margin: 5px;
                font-size: 20px;
            }

            body h1{
                font-size: 32px;
            }

            table{
                width: 90%;
                font-size: 18px;
            }

            th,
            td{
                padding: 12px;
            }
        }

        /* ========================= */
        /* RESPONSIVE CELULAR */
        /* ========================= */

        @media (max-width: 600px){

            header h1{
                font-size: 22px;
            }

            header img{
                width: 80px;
                height: 80px;
            }

            nav a{
                display: block;
                padding: 10px;
                font-size: 18px;
            }

            body h1{
                font-size: 26px;
            }

            table{
                width: 95%;
                font-size: 15px;
                display: block;
                overflow-x: auto;
            }

            th,
            td{
                padding: 8px;
            }
        }

    </style>
</head>

<body>

    <header>
        <img src="./img/images.png" alt="Logo">

        <h1>Introduccion etiquetas HTML</h1>

        <nav>
            <a href="contenedor.html">Contenedor</a>
            <a href="lista.html">Listas</a>
            <a href="tabla.html">Tablas</a>
            <a href="formulario.html">Formulario</a>
            <a href="bootstrap.html">Bootstrap</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="index.html">Inicio</a>
        </nav>
    </header>

    <h1>Tablas</h1>

    <table>
        <tr>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Edad</th>
        </tr>

        <tr>
            <td>Arturo</td>
            <td>Heredia</td>
            <td>17</td>
        </tr>

        <tr>
            <td>Emir</td>
            <td>Olmos</td>
            <td>17</td>
        </tr>
    </table>

</body>
</html>
